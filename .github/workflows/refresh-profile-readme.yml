name: Refresh Profile README

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "README.md"
      - "generate_readme.py"
      - "refresh_github_stats.py"
      - "manage_section.py"
      - "data/**"
      - ".github/workflows/refresh-profile-readme.yml"
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Refresh monthly GitHub stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python refresh_github_stats.py

      - name: Regenerate README
        run: python generate_readme.py

      - name: Commit changes if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/github_stats.json README.md assets/github-pulse-monthly.svg assets/github-pulse-yearly.svg
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh profile stats"
            git push
          fi
